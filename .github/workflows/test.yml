name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Validate generated files match templates
        run: make validate

      - name: Run generator tests
        run: zsh ./tests/test-generate.sh

      - name: Run install tests
        run: zsh ./tests/test-install.sh

      - name: Run skill validation
        run: zsh ./tests/validate-skills.sh
