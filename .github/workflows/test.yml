name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run install tests
        run: ./tests/test-install.sh

      - name: Run skill validation
        run: ./tests/validate-skills.sh
